<!--
  agent.conf
  ──────────
  Deploy this via the Wazuh dashboard:
  Agent Management → Groups → <your-group> → Files → agent.conf

  Update the Python path to match the actual installation on your endpoints.
  Run `where python` as Administrator on a target machine to confirm.
-->
<agent_config>

  <!-- Command wodle: runs browser_monitor.py every 1 minute -->
  <wodle name="command">
    <disabled>no</disabled>
    <tag>browser-monitor</tag>
    <command>C:\Program Files\Python314\python.exe "C:\Program Files (x86)\ossec-agent\shared\browser_monitor.py"</command>
    <interval>1m</interval>
    <run_on_start>yes</run_on_start>
    <timeout>55</timeout>
    <ignore_output>no</ignore_output>
  </wodle>

  <!-- Logcollector: tails the JSON output produced by the script -->
  <localfile>
    <log_format>json</log_format>
    <location>C:\Program Files (x86)\ossec-agent\shared\browser_history.log</location>
  </localfile>

</agent_config>
